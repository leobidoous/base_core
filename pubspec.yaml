name: base_core
description: Um package auxiliar para manter as dependências globais de um aplicativo multi-repositório e mono-repositório.
homepage: https://www.github.com/leobidoous
repository: https://www.github.com/leobidoous/base_core
issue_tracker: https://www.github.com/leobidoous/base_core/issues
version: 1.4.6

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  #===== Firebase depedencies ===================
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_database: ^12.2.0
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  firebase_crashlytics: ^5.2.0
  firebase_remote_config: ^6.4.0
  firebase_in_app_messaging: ^0.9.2
  #==============================================

  #===== New dependecies for new app flutter =====
  dio: ^5.9.2
  intl: ^0.20.2
  rxdart: ^0.28.0
  equatable: ^2.0.8
  local_auth: ^3.0.1
  share_plus: ^12.0.2
  geolocator: ^14.0.2
  path_provider: ^2.1.5
  local_auth_darwin: ^2.0.3
  connectivity_plus: ^7.1.1
  package_info_plus: ^9.0.1
  shared_preferences: ^2.5.5
  local_auth_android: ^2.0.8
  permission_handler: ^12.0.1
  flutter_secure_storage: ^10.0.0
  mask_text_input_formatter: ^2.9.0
  flutter_local_notifications: ^21.0.0
  #==============================================

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
